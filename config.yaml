indexes:
  - code: "000922"
    name: "中证红利"
    market: "CN"
    template: "dividend"
    lixinger_code: "000922"
  - code: "930955"
    name: "中证红利低波"
    market: "CN"
    template: "dividend"
    lixinger_code: "930955"
  - code: "515450"
    name: "标普中国红利低波50ETF"
    market: "CN"
    template: "dividend"
  - code: "399371"
    name: "国证价值100"
    market: "CN"
    template: "value"
    lixinger_code: "399371"
  - code: "159201"
    name: "国证自由现金流ETF"
    market: "CN"
    template: "value"
  - code: "IXIC"
    name: "纳指"
    market: "US"
    template: "growth"
  - code: "SPX"
    name: "标普500"
    market: "US"
    template: "balanced"

scoring:
  templates:
    dividend:
      factors:
        - { field: "dividend_yield_percentile_5y", weight: 0.45 }
        - { field: "pe_percentile_5y", weight: 0.30 }
        - { field: "price_position_percentile_3y", weight: 0.25 }
    value:
      factors:
        - { field: "pe_percentile_5y", weight: 0.40 }
        - { field: "pb_percentile_5y", weight: 0.30 }
        - { field: "dividend_yield_percentile_5y", weight: 0.30 }
    growth:
      factors:
        - { field: "pe_percentile_5y", weight: 0.50 }
        - { field: "price_position_percentile_3y", weight: 0.40 }
        - { field: "dividend_yield_percentile_5y", weight: 0.10 }
    balanced:
      factors:
        - { field: "pe_percentile_5y", weight: 0.35 }
        - { field: "dividend_yield_percentile_5y", weight: 0.35 }
        - { field: "price_position_percentile_3y", weight: 0.30 }
  pe_percentile_years: 5
  dividend_yield_percentile_years: 5
  price_position_years: 3

score_ranges:
  - max_percentile: 20
    score: 1
  - max_percentile: 40
    score: 3
  - max_percentile: 60
    score: 5
  - max_percentile: 80
    score: 7
  - max_percentile: 100
    score: 9

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key_env: "INDEX_SCORE_LLM_API_KEY"
  base_url: "https://api.deepseek.com"
  timeout: 30

lixinger:
  token_env: "LIXINGER_TOKEN"
  base_url: "https://open.lixinger.com/api"
  timeout: 30

report:
  show_detail: true
  sort_by: "score"
